<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Calendar | EduSync Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="displayWelcome()" class="calendar-page">

    <aside class="sidebar">
        <div class="logo">EduSync Life</div>
        <nav class="sidebar-nav">
             <a href="dashboard.html">🏠 Dashboard</a>
            <a href="attendance.html">📊 Attendance</a>
            <a href="calendar.html" class="active">📅 Calendar</a>
            <a href="routine.html">📝 Daily Routine</a>
            <a href="expenses.html">💰 Expenses</a>
            <a href="cgpa.html">🎓 CGPA Strategist</a>
             <a href="cgpa-calculator.html" >🧮 CGPA Calculator</a> 
        </nav>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                </div>
    </aside>

    <main class="main-content">
        <header class="dashboard-header" style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px #A0522D;">
            <div>
                <h1 id="monthYear" style="color: black; margin: 0; font-size: 1.8rem; font-weight: 800;">Loading...</h1>
                <div style="margin-top: 5px;">
                    <button class="btn-outline" onclick="changeYear(-1)" style="padding: 2px 8px; font-size: 0.75rem;">« Prev Year</button>
                    <button class="btn-outline" onclick="changeYear(1)" style="padding: 2px 8px; font-size: 0.75rem;">Next Year »</button>
                </div>
            </div>

            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="date" id="searchDate" style="width: 140px; margin: 0; padding: 5px; border-radius: 4px; border: 1px solid var(--border);">
                <button class="btn-main" onclick="goToDate()" style="padding: 7px 15px;">Search</button>
                <div class="controls" style="display: flex; gap: 5px;">
                    <button class="btn-outline" onclick="prevMonth()">◀</button>
                    <button class="btn-outline" onclick="nextMonth()">▶</button>
                </div>
            </div>
        </header>

        <div class="card" style="padding: 0; max-width: 100%; margin: 0;">
            <div class="calendar-grid" id="calendar"></div>
        </div>
    </main>

    <div class="modal" id="eventModal">
        <div class="modal-content" style="background: white; border-top: 5px solid var(--primary); width: 350px; max-height: 85vh; overflow-y: auto; padding: 20px; border-radius: 12px;">
            <h3 id="modalDateTitle" style="margin-top: 0; color: #1e293b; border-bottom: 1px solid #edf2f7; padding-bottom: 10px;">Events</h3>
            
            <div id="eventListContainer" style="margin-bottom: 20px; max-height: 200px; overflow-y: auto;">
                </div>

            <hr style="border: 0; border-top: 1px solid #edf2f7; margin: 20px 0;">

            <h4 id="formTitle" style="margin: 0 0 10px 0; font-size: 0.9rem; color: #64748b;">Add New Event</h4>
            
            <input type="hidden" id="editIndex" value="-1">
            
            <label style="font-size: 0.75rem; color: #64748b;">Event Name</label>
            <input type="text" id="eventTitle" placeholder="What is happening?">

            <label style="font-size: 0.75rem; color: #64748b;">Description</label>
            <input type="text" id="eventDescription" placeholder="Optional notes">
            
            <label style="font-size: 0.75rem; color: #64748b;">Time</label>
            <input type="time" id="eventTime">

            <label style="font-size: 0.75rem; color: #64748b;">Repeat</label>
            <select id="eventRepeat" style="width: 100%; padding: 8px; margin: 8px 0; border-radius: 6px; border: 1px solid var(--border);">
                <option value="none">Does not repeat</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
            
            <label style="font-size: 0.75rem; color: #64748b;">Category Color</label>
            <select id="eventCategory" style="width: 100%; padding: 8px; margin: 8px 0; border-radius: 6px; border: 1px solid var(--border);">
                <option value="#bc4ca0">Academic (Pink)</option>
                <option value="#3b82f6">Personal (Blue)</option>
                <option value="#ef4444">Urgent (Red)</option>
                <option value="#10b981">Social (Green)</option>
            </select>

            <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0; padding: 10px; background: #f8fafc; border-radius: 6px;">
                <input type="checkbox" id="reminder" style="width: auto; margin: 0;">
                <label for="reminder" style="font-size: 0.85rem; cursor: pointer; color: #475569;">Enable Alarm/Reminder</label>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-main" onclick="saveEvent()" id="saveBtn" style="flex: 1;">Save</button>
                <button class="btn-outline" onclick="closeModal()" style="flex: 1;">Close</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
