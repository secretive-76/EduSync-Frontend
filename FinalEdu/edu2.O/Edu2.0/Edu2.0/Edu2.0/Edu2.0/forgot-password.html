<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EduSync</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card" style="max-width: 440px;">
        <h1 style="margin-bottom: 10px;">Forgot Password</h1>
        <p style="color: var(--text-muted); margin-bottom: 25px;">
            Enter your email address and we'll send you a secure reset link.
        </p>

        <input type="email" id="forgotEmail" placeholder="Email Address" required>
        <button class="btn-main" id="sendResetBtn" onclick="sendResetLink()">Send Reset Link</button>

        <p id="forgotMessage" style="display:none; margin-top:16px; color:#166534; font-size:0.92rem;"></p>

        <p style="margin-top: 20px; font-size: 0.92rem;">
            <a href="index.html" class="auth-link">Back to Login</a>
        </p>
    </div>

    <script>
        const apiBaseUrl = 'https://edusync-life-1.onrender.com/api/auth';

        async function sendResetLink() {
            const emailInput = document.getElementById('forgotEmail');
            const message = document.getElementById('forgotMessage');
            const button = document.getElementById('sendResetBtn');
            const email = emailInput.value.trim();

            if (!email) {
                alert('Please enter your email address.');
                return;
            }

            button.disabled = true;
            button.textContent = 'Sending...';

            try {
                const response = await fetch(`${apiBaseUrl}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();
                message.style.display = 'block';
                message.textContent = result.message || 'If an account exists with this email, a reset link has been sent.';
            } catch (error) {
                message.style.display = 'block';
                message.textContent = 'If an account exists with this email, a reset link has been sent.';
            } finally {
                button.disabled = false;
                button.textContent = 'Send Reset Link';
            }
        }
    </script>
</body>
</html>
