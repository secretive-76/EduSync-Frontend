<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EduSync Life</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-panel {
            max-width: 460px;
            width: min(100%, 460px);
            margin: 6vh auto;
            padding: 32px 28px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(80, 15, 30, 0.16);
            border: 1px solid rgba(128, 0, 32, 0.12);
        }

        .auth-panel h1 {
            margin: 0 0 10px;
            color: #4b1020;
        }

        .auth-panel p {
            margin: 0 0 18px;
            color: #6b7280;
        }

        .auth-panel input,
        .auth-panel button {
            width: 100%;
            box-sizing: border-box;
        }

        .auth-panel input {
            margin-top: 12px;
        }

        .status-message {
            min-height: 24px;
            margin-top: 16px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body class="login-body">
    <main class="auth-panel">
        <h1>Forgot Password</h1>
        <p>Enter your email address to receive a reset code.</p>
        <form id="forgotPasswordForm" novalidate>
            <input type="email" id="email" name="email" placeholder="Email address" autocomplete="email" required>
            <button type="submit" class="btn-main" id="forgotPasswordButton" style="margin-top: 18px;">Send reset code</button>
        </form>
        <div id="forgotPasswordMessage" class="status-message" aria-live="polite"></div>
        <p style="margin-top: 20px; font-size: 0.92rem;">
            <a href="index.html" class="auth-link">Back to Login</a>
        </p>
    </main>

    <script>
        const apiBaseUrl = 'https://edusync-life-production.up.railway.app/api/auth';
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const forgotPasswordButton = document.getElementById('forgotPasswordButton');
        const forgotPasswordMessage = document.getElementById('forgotPasswordMessage');

        const showMessage = (message, color) => {
            forgotPasswordMessage.textContent = message;
            forgotPasswordMessage.style.color = color;
        };

        forgotPasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();

            if (!email) {
                showMessage('Please enter your email address.', '#991b1b');
                return;
            }

            forgotPasswordButton.disabled = true;
            forgotPasswordButton.textContent = 'Sending...';
            showMessage('', '#166534');

            try {
                const response = await fetch(`${apiBaseUrl}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const responseText = await response.text();
                let result = {};

                if (responseText) {
                    try {
                        result = JSON.parse(responseText);
                    } catch (parseError) {
                        result = { message: responseText };
                    }
                }

                if (!response.ok) {
                    throw new Error(result.message || 'Unable to send reset code.');
                }

                showMessage('If an account exists with this email, a password reset code has been sent to your email.', '#166534');
                sessionStorage.setItem('resetEmail', email);

                setTimeout(() => {
                    window.location.href = 'reset-password.html';
                }, 2200);
            } catch (error) {
                showMessage(error.message || 'Connection failed. Please try again.', '#991b1b');
            } finally {
                forgotPasswordButton.disabled = false;
                forgotPasswordButton.textContent = 'Send reset code';
            }
        });
    </script>
</body>
</html>
