<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EduSync</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card" style="max-width: 440px;">
        <h1 style="margin-bottom: 10px;">Reset Password</h1>
        
        <div id="step1">
            <p style="color: var(--text-muted); margin-bottom: 25px;">
                Enter your email address and we'll send you a 6-digit OTP.
            </p>
            <input type="email" id="forgotEmail" placeholder="Email Address" required>
            <button class="btn-main" id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
        </div>

        <div id="step2" style="display: none;">
            <p style="color: var(--text-muted); margin-bottom: 25px;">
                Enter the OTP sent to your email and your new password.
            </p>
            <input type="text" id="otpInput" placeholder="6-Digit OTP" maxlength="6" required>
            <input type="password" id="newPassword" placeholder="New Password" required style="margin-top: 10px;">
            <button class="btn-main" id="resetBtn" onclick="resetPassword()" style="margin-top: 15px;">Reset Password</button>
        </div>

        <p id="forgotMessage" style="display:none; margin-top:16px; color:#166534; font-size:0.92rem;"></p>

        <p style="margin-top: 20px; font-size: 0.92rem;">
            <a href="index.html" class="auth-link">Back to Login</a>
        </p>
    </div>

<script>
    const apiBaseUrl = 'https://edusync-life-1.onrender.com/api/auth';

    // --- STEP 1: SEND OTP ---
    async function sendOtp() {
        const email = document.getElementById('forgotEmail').value.trim();
        const btn = document.getElementById('sendOtpBtn');
        const msg = document.getElementById('forgotMessage');

        if (!email) {
            showToast('Please enter your email address', 'error');
            return;

        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
            const response = await fetch(`${apiBaseUrl}/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const result = await response.json();
            if (response.ok) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                msg.style.display = 'block';
                msg.textContent = 'OTP sent to your email!';
            } else {
                showToast(result.message || 'Failed to send OTP', 'error');
            }
        } catch (error) {
            showToast('Connection failed. Check your internet', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send OTP';
        }
    }

    // --- STEP 2: RESET PASSWORD ---
    async function resetPassword() {
        const email = document.getElementById('forgotEmail').value.trim();
        const otp = document.getElementById('otpInput').value.trim();
        const password = document.getElementById('newPassword').value;
        const btn = document.getElementById('resetBtn');

        if (!otp || !password) {
            showToast('Please fill in all fields', 'error');
            return;

        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
            // FIXED: Removed '-otp' and used 'otpCode' to match your authController
            const response = await fetch(`${apiBaseUrl}/reset-password`, { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otpCode: otp, password }) 
            });

            const result = await response.json();
            if (response.ok) {
                showToast('Password reset successful! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = 'index.html', 500);
            } else {
                showToast(result.message || 'Invalid OTP', 'error');
            }
        } catch (error) {
            showToast('Failed to reset password. Please try again', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    } // Added missing closing brace for resetPassword
</script>
</body>
</html>
