<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EduSync Life</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-panel {
            max-width: 500px;
            width: min(100%, 500px);
            margin: 6vh auto;
            padding: 32px 28px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(80, 15, 30, 0.16);
            border: 1px solid rgba(128, 0, 32, 0.12);
        }

        .auth-panel h1 {
            margin: 0 0 10px;
            color: #4b1020;
        }

        .auth-panel p {
            margin: 0 0 18px;
            color: #6b7280;
        }

        .auth-panel input,
        .auth-panel button {
            width: 100%;
            box-sizing: border-box;
        }

        .auth-panel input {
            margin-top: 12px;
        }

        .status-message {
            min-height: 24px;
            margin-top: 16px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body class="login-body">
    <main class="auth-panel">
        <h1>Reset Password</h1>
        <p>Enter the email, OTP code, and your new password.</p>
        <form id="resetPasswordForm" novalidate>
            <input type="email" id="email" name="email" placeholder="Email address" autocomplete="email" required>
            <input type="text" id="otpCode" name="otpCode" placeholder="OTP code" inputmode="numeric" maxlength="6" required>
            <input type="password" id="password" name="password" placeholder="New password" autocomplete="new-password" required>
            <button type="submit" class="btn-main" id="resetPasswordButton" style="margin-top: 18px;">Reset Password</button>
        </form>
        <div id="resetPasswordMessage" class="status-message" aria-live="polite"></div>
        <p style="margin-top: 20px; font-size: 0.92rem;">
            <a href="forgot-password.html" class="auth-link">Back to Forgot Password</a>
        </p>
    </main>

    <script>
        const apiBaseUrl = 'https://edusync-life-production.up.railway.app/api/auth';
        const resetPasswordForm = document.getElementById('resetPasswordForm');
        const resetPasswordButton = document.getElementById('resetPasswordButton');
        const resetPasswordMessage = document.getElementById('resetPasswordMessage');

        const showMessage = (message, color) => {
            resetPasswordMessage.textContent = message;
            resetPasswordMessage.style.color = color;
        };

        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = sessionStorage.getItem('resetEmail');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
            }
        });

        resetPasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const otpCode = document.getElementById('otpCode').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !otpCode || !password) {
                showMessage('All fields are required.', '#991b1b');
                return;
            }

            resetPasswordButton.disabled = true;
            resetPasswordButton.textContent = 'Resetting...';
            showMessage('', '#166534');

            try {
                const response = await fetch(`${apiBaseUrl}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otpCode, password })
                });

                const responseText = await response.text();
                let result = {};

                if (responseText) {
                    try {
                        result = JSON.parse(responseText);
                    } catch (parseError) {
                        result = { message: responseText };
                    }
                }

                if (!response.ok) {
                    throw new Error(result.message || 'Password reset failed.');
                }

                showMessage('Password reset successful. Redirecting to login...', '#166534');
                sessionStorage.removeItem('resetEmail');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2200);
            } catch (error) {
                showMessage(error.message || 'Error resetting password. Please try again.', '#991b1b');
            } finally {
                resetPasswordButton.disabled = false;
                resetPasswordButton.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
