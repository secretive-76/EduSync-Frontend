<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EduSync</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card" style="max-width: 460px;">
        <h1 style="margin-bottom: 10px;">Reset Password</h1>
        <p style="color: var(--text-muted); margin-bottom: 25px;">
            Set your new password below.
        </p>

        <input type="password" id="newPassword" placeholder="New Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

        <button class="btn-main" id="resetBtn" onclick="submitResetPassword()">Reset Password</button>

        <p id="resetMessage" style="display:none; margin-top:16px; font-size:0.92rem;"></p>

        <p style="margin-top: 20px; font-size: 0.92rem;">
            <a href="index.html" class="auth-link">Back to Login</a>
        </p>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            alert('Invalid or missing reset token.');
            window.location.href = 'index.html';
        }

        async function submitResetPassword() {
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const message = document.getElementById('resetMessage');
            const button = document.getElementById('resetBtn');

            if (!password || !confirmPassword) {
                alert('Please fill in both password fields.');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            button.disabled = true;
            button.textContent = 'Resetting...';

            try {
                const response = await fetch(`http://localhost:5000/api/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();
                message.style.display = 'block';

                if (response.ok && result.success) {
                    alert('Password updated! Redirecting to login...');
                    message.style.color = '#166534';
                    message.textContent = 'Password reset successful. Redirecting to login...';
                    window.location.href = 'index.html';
                } else {
                    message.style.color = '#991b1b';
                    message.textContent = result.message || 'Password reset failed. Please request a new link.';
                }
            } catch (error) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Unable to reset password right now. Please try again.';
            } finally {
                button.disabled = false;
                button.textContent = 'Reset Password';
            }
        }
    </script>
</body>
</html>
