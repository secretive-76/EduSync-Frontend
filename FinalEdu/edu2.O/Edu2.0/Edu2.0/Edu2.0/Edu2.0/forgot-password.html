<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EduSync</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card" style="max-width: 440px;">
        <h1 style="margin-bottom: 10px;">Reset Password</h1>
        
        <div id="step1">
            <p style="color: var(--text-muted); margin-bottom: 25px;">
                Enter your email address and we'll send you a 6-digit OTP.
            </p>
            <input type="email" id="forgotEmail" placeholder="Email Address" required>
            <button class="btn-main" id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
        </div>


        <p id="forgotMessage" style="display:none; margin-top:16px; color:#166534; font-size:0.92rem;"></p>

        <p style="margin-top: 20px; font-size: 0.92rem;">
            <a href="index.html" class="auth-link">Back to Login</a>
        </p>
    </div>

<script>
    const apiBaseUrl = 'https://edusync-life-1.onrender.com/api/auth';

    function notify(message, type = 'info') {
        if (typeof window.showToast === 'function') {
            window.showToast(message, type);
            return;
        }

        const msg = document.getElementById('forgotMessage');
        if (!msg) return;

        msg.style.display = 'block';
        msg.style.color = type === 'error' ? '#991b1b' : '#166534';
        msg.textContent = message;
    }

    // --- STEP 1: SEND OTP ---
    async function sendOtp() {
    // ... existing validation ...
    try {
        const response = await fetch(`${apiBaseUrl}/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const result = await response.json();
        if (response.ok) {
            sessionStorage.setItem('resetEmail', email); // Save for the next page
            notify('OTP sent! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'reset-password.html';
            }, 1000);
        } else {
            notify(result.message || 'User not found', 'error');
        }
    } catch (error) {
        notify('Network error. Is the server awake?', 'error');
    }
}
    // --- STEP 2: RESET PASSWORD ---
     // Added missing closing brace for resetPassword
</script>
</body>
</html>
