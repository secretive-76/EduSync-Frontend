<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracking | EduSync Life</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="attendance-page">

    <aside class="sidebar">
        <div class="logo">EduSync Life</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="attendance.html" class="active">📊 Attendance</a>
            <a href="calendar.html">📅 Calendar</a>
            <a href="routine.html">📝 Daily Routine</a>
            <a href="expenses.html">💰 Expenses</a>
            <a href="cgpa.html">🎓 CGPA Strategist</a>
            <a href="cgpa-calculator.html">🧮 CGPA Calculator</a> 
        </nav>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                </div>
    </aside>

    <main class="main-content">
        <div class="page-wrapper">
            <section class="card" style="max-width: 560px;">
                <h2>Attendance Calculator</h2>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Generate or load a course sheet, mark absences, and sync each sheet to cloud.</p>

                <label>Course Name</label>
                <input type="text" id="courseName" placeholder="e.g. Mathematics">

                <label>Course Credit</label>
                <input type="number" id="credit" placeholder="e.g. 3" min="0" step="0.5">

                <button class="btn-main" onclick="generateAttendanceSheet()">Generate / Load Sheet</button>
            </section>

            <section class="card" style="margin-top: 20px; max-width: 900px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;">
                    <h3 style="margin:0;">Saved Attendance Sheets</h3>
                    <span style="font-size:0.85rem; color:#64748b;">Each course is stored and synced independently</span>
                </div>
                <div id="attendanceCards" style="display:grid; gap:14px;"></div>
            </section>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/attendance.js"></script>
</body>
</html>
