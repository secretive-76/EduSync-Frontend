<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | EduSync</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h2>Join EduSync! 📝</h2>
        <div id="registerFormSection">
            <input type="text" id="regName" placeholder="Username">
            <input type="email" id="regEmail" placeholder="Email Address">
            <input type="password" id="regPass" placeholder="Set Password">
            <input type="password" id="regPassConfirm" placeholder="Retype Password">
            
            <button class="btn-main" id="registerButton" onclick="handleRegister()">Create Account ✅</button>
        </div>

        <div id="otpSection" style="display:none; margin-top: 16px; padding: 18px; border-radius: 14px; background: #fff8f0; border: 1px solid #f1d3b2;">
            <h3 style="margin: 0 0 8px 0; color: #4a2f1e;">Verify Your Email</h3>
            <p style="margin: 0 0 12px 0; color: #6b4f3f; font-size: 0.92rem;">We sent a 6-digit OTP to your email. Enter it below to activate your account.</p>
            <input type="text" id="otpCode" placeholder="6-digit OTP" maxlength="6" inputmode="numeric" style="letter-spacing: 0.3em; text-align: center; font-weight: 700;">
            <button class="btn-main" id="verifyOtpButton" onclick="handleVerifyOtp()">Verify OTP 🔐</button>
            <button class="btn-main" id="resendOtpButton" onclick="handleResendOtp()" style="margin-top: 10px; background: #a05f0f;">Resend OTP 📧</button>
        </div>
        <div id="registerStatus" style="display:none; margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: 600;"></div>
        
        <p style="margin-top: 15px;">Already have an account? <a href="index.html">Login</a></p>
    </div>

    <script src="js/app.js"></script>
    <script>
        const apiBaseUrl = 'https://edusync-life-1.onrender.com/api/auth';

        function clearExistingSession() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('token');
            localStorage.removeItem('currentUserEmail');
            localStorage.removeItem('currentUserName');
        }

        function showOtpSection(visible) {
            document.getElementById('otpSection').style.display = visible ? 'block' : 'none';
        }

        function showStatus(message, type) {
            const statusBox = document.getElementById('registerStatus');
            statusBox.style.display = 'block';
            statusBox.style.background = type === 'success' ? '#dcfce7' : type === 'warning' ? '#fef3c7' : '#fee2e2';
            statusBox.style.color = type === 'success' ? '#166534' : type === 'warning' ? '#92400e' : '#991b1b';
            statusBox.textContent = message;
        }

        async function handleRegister() {
            const registerButton = document.getElementById('registerButton');
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('regPassConfirm').value;

            clearExistingSession();
            registerButton.disabled = true;

            if (!name || !email || !pass) {
                registerButton.disabled = false;
                showToast('Please fill in all fields', 'error');
                return;
            }
            if (pass !== confirm) {
                registerButton.disabled = false;
                showToast('Passwords do not match', 'error');
                return;
            }

            try {
                const response = await fetch(`${apiBaseUrl}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: name,
                        email: email, 
                        password: pass 
                    }) 
                });

                const data = await response.json();
                registerButton.disabled = false;

                if (!response.ok) {
                    showToast(data.message || data.error || 'Signup failed', 'error');
                    return;
                }

                showOtpSection(true);
                showStatus(data.message || 'Verification code sent. Check your inbox.', 'success');

            } catch (err) {
                registerButton.disabled = false;
                console.error("Connection error:", err);
                showToast('Cannot connect to server. Please try again', 'error');
                return;
            }
        }

        async function handleVerifyOtp() {
            const email = document.getElementById('regEmail').value.trim();
            const otpCode = document.getElementById('otpCode').value.trim();
            const verifyOtpButton = document.getElementById('verifyOtpButton');

            if (!email || !otpCode) {
                showToast('Please enter your email and OTP code', 'error');
                return;
            }

            verifyOtpButton.disabled = true;
            verifyOtpButton.textContent = 'Verifying... ⏳';

            try {
                const response = await fetch(`${apiBaseUrl}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otpCode })
                });

                const data = await response.json();

                if (!response.ok) {
                    showStatus(data.message || 'OTP verification failed.', 'warning');
                    return;
                }

                if (data.user?.email) localStorage.setItem('currentUserEmail', data.user.email);
                if (data.user?.username) localStorage.setItem('currentUserName', data.user.username);
                if (data.token) localStorage.setItem('authToken', data.token);

                showStatus(data.message || 'Email verified successfully.', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 900);
            } catch (error) {
                console.error('OTP verification error:', error);
                showStatus('Unable to verify OTP right now. Please try again.', 'warning');
            } finally {
                verifyOtpButton.disabled = false;
                verifyOtpButton.textContent = 'Verify OTP 🔐';
            }
        }

        async function handleResendOtp() {
            const email = document.getElementById('regEmail').value.trim();

            if (!email) {
                showToast('Please enter the email address you used to register', 'error');
                return;
            }

            try {
                const response = await fetch(`${apiBaseUrl}/resend-verification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    return showStatus(data.message || 'Unable to resend OTP.', 'warning');
                }

                showOtpSection(true);
                showStatus(data.message || 'A new OTP has been sent to your email.', 'success');
            } catch (error) {
                console.error('OTP resend error:', error);
                showStatus('Server connection failed while resending OTP.', 'warning');
            }
        }
    </script>
</body>
</html>
