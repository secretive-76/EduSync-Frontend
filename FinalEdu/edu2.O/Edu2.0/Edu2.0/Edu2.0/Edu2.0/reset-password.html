<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EduSync</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-section { display: none; }
        .form-section.active { display: block; }
        .resend-link { 
            text-align: center; 
            margin-top: 16px; 
            font-size: 0.92rem;
        }
        .resend-link a {
            color: #800020;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
        .resend-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-card" style="max-width: 460px; border-top: 8px solid #800020;">
        
        <!-- Step 1: OTP Verification -->
        <div id="otpSection" class="form-section active">
            <h1 style="margin-bottom: 10px;">Verify Your Identity</h1>
            <p style="color: #6d4c41; margin-bottom: 25px;">Enter the 6-digit code we sent to your email.</p>

            <input type="text" id="otpCode" placeholder="Enter 6-digit code" maxlength="6" required>
            <button class="btn-main" id="verifyOtpBtn" onclick="verifyOtp()" style="background:#800020;">Verify Code</button>

            <p id="otpMessage" style="display:none; margin-top:16px; font-size:0.92rem;"></p>

            <div class="resend-link">
                <a onclick="resendOtp()">Didn't receive code? Resend</a>
            </div>

            <p style="margin-top: 20px; font-size: 0.92rem;">
                <a href="forgot-password.html" style="color: #800020; font-weight: 700; text-decoration: none;">Use different email</a>
            </p>
        </div>

        <!-- Step 2: Reset Password -->
        <div id="passwordSection" class="form-section">
            <h1 style="margin-bottom: 10px;">Set New Password</h1>
            <p style="color: #6d4c41; margin-bottom: 25px;">Enter your new password below.</p>

            <input type="password" id="newPassword" placeholder="New Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button class="btn-main" id="resetBtn" onclick="submitResetPassword()" style="background:#800020;">Reset Password</button>

            <p id="resetMessage" style="display:none; margin-top:16px; font-size:0.92rem;"></p>

            <p style="margin-top: 20px; font-size: 0.92rem;">
                <a href="index.html" style="color: #800020; font-weight: 700; text-decoration: none;">Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        const apiBaseUrl = 'https://edusync-life-1.onrender.com/api/auth';
        const AUTH_ROUTES = Object.freeze({
            verifyResetOtp: '/verify-reset-otp',
            resetPassword: '/reset-password',
            forgotPassword: '/forgot-password'
        });
        let userEmail = '';
        let verifiedOtp = '';

        // Initialize - get email from sessionStorage or redirect
        document.addEventListener('DOMContentLoaded', function() {
            userEmail = sessionStorage.getItem('resetEmail');
            if (!userEmail) {
                alert('Please start from the Forgot Password page.');
                window.location.href = 'forgot-password.html';
            }
        });

        async function verifyOtp() {
            const otpCode = document.getElementById('otpCode').value.trim();
            const message = document.getElementById('otpMessage');
            const button = document.getElementById('verifyOtpBtn');

            if (!otpCode || otpCode.length !== 6 || isNaN(otpCode)) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Please enter a valid 6-digit code.';
                return;
            }

            button.disabled = true;
            button.textContent = '⏳ Verifying...';

            try {
                const response = await fetch(`${apiBaseUrl}${AUTH_ROUTES.verifyResetOtp}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otpCode })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    message.style.display = 'block';
                    message.style.color = '#166534';
                    message.textContent = '✅ Code verified! Proceeding to password reset...';
                    verifiedOtp = otpCode;
                    
                    // Switch to password section after 1 second
                    setTimeout(() => {
                        document.getElementById('otpSection').classList.remove('active');
                        document.getElementById('passwordSection').classList.add('active');
                    }, 1000);
                } else {
                    message.style.display = 'block';
                    message.style.color = '#991b1b';
                    message.textContent = result.message || 'Invalid or expired code. Please try again.';
                }
            } catch (error) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Error verifying code. Please try again.';
            } finally {
                button.disabled = false;
                button.textContent = 'Verify Code';
            }
        }

        async function resendOtp() {
            const message = document.getElementById('otpMessage');
            
            try {
                const response = await fetch(`${apiBaseUrl}${AUTH_ROUTES.forgotPassword}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                const result = await response.json();
                message.style.display = 'block';

                if (response.ok) {
                    message.style.color = '#166534';
                    message.textContent = 'Verification code resent! Check your email.';
                    document.getElementById('otpCode').value = '';
                } else {
                    message.style.color = '#991b1b';
                    message.textContent = result.message || 'Error resending code. Please try again.';
                }
            } catch (error) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Error resending code. Please try again.';
            }
        }

        async function submitResetPassword() {
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const message = document.getElementById('resetMessage');
            const button = document.getElementById('resetBtn');

            if (!password || !confirmPassword) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Please fill in both password fields.';
                return;
            }

            if (password.length < 6) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Password must be at least 6 characters long.';
                return;
            }

            if (password !== confirmPassword) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Passwords do not match.';
                return;
            }

            button.disabled = true;
            button.textContent = '⏳ Resetting...';

            try {
                const response = await fetch(`${apiBaseUrl}${AUTH_ROUTES.resetPassword}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: userEmail, 
                        otpCode: verifiedOtp, 
                        password 
                    })
                });

                const result = await response.json();
                message.style.display = 'block';

                if (response.ok && result.success) {
                    message.style.color = '#166534';
                    message.textContent = '✅ Password reset successful! Redirecting to login...';
                    sessionStorage.removeItem('resetEmail');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    message.style.color = '#991b1b';
                    message.textContent = result.message || 'Password reset failed. Please try again.';
                }
            } catch (error) {
                message.style.display = 'block';
                message.style.color = '#991b1b';
                message.textContent = 'Error resetting password. Please try again.';
            } finally {
                button.disabled = false;
                button.textContent = 'Reset Password';
            }
        }
    </script>
</body>
</html>
